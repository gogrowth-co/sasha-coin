<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reference Library</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08111f; font-family: Inter, -apple-system, sans-serif; padding: 32px; color: #fff; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: rgba(255,255,255,0.35); font-size: 12px; margin-bottom: 24px; }
  .empty { color: rgba(255,255,255,0.25); font-size: 14px; margin-top: 60px; text-align: center; line-height: 1.8; }
  .empty code { background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(31,182,255,0.25);
    background: transparent; color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #1FB6FF; border-color: #1FB6FF; color: #000; font-weight: 600;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card {
    background: #0d1f35; border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(31,182,255,0.08); transition: border-color 0.15s;
  }
  .card:hover { border-color: rgba(31,182,255,0.3); }
  .card img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; background: #0a1a2e; }
  .card-meta { padding: 10px 12px; }
  .format-tag { font-size: 10px; color: #1FB6FF; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
  .source-name { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-url { font-size: 10px; color: rgba(255,255,255,0.2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag { font-size: 9px; padding: 2px 7px; border-radius: 10px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); }
</style>
</head>
<body>
  <h1 id="project-title">Reference Library</h1>
  <p class="subtitle" id="subtitle">No references yet</p>

  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active" onclick="filter('all', event)">All</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="empty-state">
    No references yet.<br><br>
    Run the <code>visual-references</code> skill to populate this library.
  </div>

<script>
const FORMAT_LABELS = {
  'social-post': 'Social Post',
  'carousel': 'Carousel',
  'landing-page': 'Landing Page',
  'dashboard': 'Dashboard / App UI',
  'deck': 'Deck / Presentation',
  'video-thumbnail': 'Video Thumbnail',
  'ad-creative': 'Ad Creative',
  'email-header': 'Email Header',
  'og-image': 'OG Image / Blog Hero',
  'profile-asset': 'Profile / Avatar'
};

async function init() {
  try {
    const res = await fetch('library.json');
    const lib = await res.json();

    if (!lib.references || lib.references.length === 0) return;

    document.getElementById('empty-state').style.display = 'none';

    const titleEl = document.getElementById('project-title');
    if (lib.project) titleEl.textContent = 'Reference Library — ' + lib.project;

    const subtitleEl = document.getElementById('subtitle');
    subtitleEl.textContent = lib.references.length + ' references · Last updated ' + (lib.lastUpdated || '—');

    const formats = [...new Set(lib.references.map(r => r.format))].sort();
    const filtersEl = document.getElementById('filters');
    filtersEl.style.display = 'flex';
    formats.forEach(fmt => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = FORMAT_LABELS[fmt] || fmt;
      btn.onclick = (e) => filter(fmt, e);
      filtersEl.appendChild(btn);
    });

    const grid = document.getElementById('grid');
    const sorted = [...lib.references].sort((a, b) => (b.date_added || '').localeCompare(a.date_added || ''));
    sorted.forEach(ref => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.format = ref.format;
      card.innerHTML = `
        <img src="${ref.screenshot}" alt="${ref.source}" onerror="this.style.minHeight='160px'">
        <div class="card-meta">
          <div class="format-tag">${FORMAT_LABELS[ref.format] || ref.format}</div>
          <div class="source-name"><a href="${ref.url}" target="_blank" style="color:inherit;text-decoration:none">${ref.source}</a></div>
          <div class="source-url">${ref.url}</div>
          ${ref.vertical_tags && ref.vertical_tags.length ? '<div class="tags">' + ref.vertical_tags.map(t => `<span class="tag">${t}</span>`).join('') + '</div>' : ''}
        </div>`;
      grid.appendChild(card);
    });
  } catch (e) {
    // library.json not yet present — empty state already shown
  }
}

function filter(format, event) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (event) event.target.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    card.style.display = (format === 'all' || card.dataset.format === format) ? '' : 'none';
  });
}

init();
</script>
</body>
</html>

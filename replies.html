<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sasha Replies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0D0D1A;
      --card: #1a0d2e;
      --primary: #7B2FBE;
      --secondary: #4A1A8C;
      --accent: #00D4FF;
      --text: #e6e1ee;
      --muted: #8a7da3;
      --error: #ff5b7a;
      --ok: #7bd88f;
      --warn: #f5a623;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; }
    header { padding: 24px 32px 16px; border-bottom: 1px solid var(--secondary); display: flex; align-items: center; justify-content: space-between; }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 600; margin: 0; color: var(--accent); }
    h1 small { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 12px; }
    .nav { font-size: 13px; display: flex; align-items: center; gap: 4px; }
    .nav a { color: var(--muted); text-decoration: none; margin-left: 12px; }
    .nav a:hover, .nav a.active { color: var(--accent); }
    main { padding: 24px 32px; max-width: 1320px; margin: 0 auto; }
    .two-col { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
    .card { background: var(--card); border: 1px solid var(--secondary); border-radius: 8px; padding: 16px 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 0 0 14px; display: flex; align-items: center; justify-content: space-between; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #2a1a45; font-size: 13px; vertical-align: top; }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.06em; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .pill-ok    { background: rgba(123,216,143,0.15); color: var(--ok); }
    .pill-error { background: rgba(255,91,122,0.15); color: var(--error); }
    .pill-adb   { background: rgba(0,212,255,0.12); color: var(--accent); }
    .pill-api   { background: rgba(123,47,190,0.2); color: #c498f1; }
    .empty { text-align: center; color: var(--muted); padding: 32px; font-style: italic; }
    .ts { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .reply-text { max-width: 380px; line-height: 1.4; }
    .handle { font-weight: 600; color: var(--accent); }
    a.ext { color: var(--accent); text-decoration: none; }
    a.ext:hover { text-decoration: underline; }
    /* Score stars */
    .stars { display: inline-flex; gap: 2px; cursor: pointer; font-size: 16px; }
    .stars span { color: #3a2560; transition: color 0.15s; }
    .stars span.lit { color: var(--warn); }
    /* KOL list */
    .kol-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #2a1a45; }
    .kol-item:last-child { border-bottom: none; }
    .kol-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .kol-meta { flex: 1; min-width: 0; }
    .kol-name { font-weight: 600; font-size: 13px; }
    .kol-angle { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
    .kol-topics { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
    .topic-chip { background: rgba(123,47,190,0.2); color: #c498f1; border-radius: 4px; padding: 1px 6px; font-size: 11px; }
    .btn { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #9a4ad8; }
    .btn-ghost { background: transparent; border: 1px solid var(--secondary); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; border: 1px solid var(--error); color: var(--error); padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; }
    .btn-danger:hover { background: rgba(255,91,122,0.1); }
    .add-form { display: none; border-top: 1px solid var(--secondary); padding-top: 14px; margin-top: 12px; }
    .add-form.open { display: block; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field textarea, .field select { background: #110828; border: 1px solid var(--secondary); color: var(--text); border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; width: 100%; outline: none; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { min-height: 60px; resize: vertical; }
    /* Stats row */
    .stats-row { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--secondary); border-radius: 8px; padding: 14px 20px; flex: 1; }
    .stat-num { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    /* Engagement bar */
    .eng-bar { display: flex; gap: 10px; font-size: 12px; color: var(--muted); }
    .eng-bar span { display: flex; align-items: center; gap: 3px; }
    .eng-bar .val { color: var(--text); font-weight: 600; }
    /* Filter bar */
    .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar select { background: #110828; border: 1px solid var(--secondary); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-family: inherit; }
    .search-input { background: #110828; border: 1px solid var(--secondary); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-family: inherit; width: 180px; }
    .search-input::placeholder { color: var(--muted); }
    /* Score badge */
    .score-badge { display: inline-flex; align-items: center; gap: 3px; background: rgba(123,47,190,0.2); border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 600; }
    .score-badge.s5 { background: rgba(123,216,143,0.2); color: var(--ok); }
    .score-badge.s4 { background: rgba(0,212,255,0.15); color: var(--accent); }
    .score-badge.s3 { background: rgba(245,166,35,0.15); color: var(--warn); }
    .score-badge.s2, .score-badge.s1 { background: rgba(255,91,122,0.12); color: var(--error); }
    .score-badge.s0 { color: var(--muted); }
    /* Scorecard */
    .sc-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #2a1a45; }
    .sc-row:last-child { border-bottom: none; }
    .sc-handle { width: 120px; font-weight: 600; font-size: 13px; color: var(--text); }
    .sc-bar-wrap { flex: 1; background: #2a1a45; border-radius: 4px; height: 8px; overflow: hidden; }
    .sc-bar { background: var(--accent); height: 100%; border-radius: 4px; transition: width 0.4s; }
    .sc-val { width: 60px; text-align: right; font-size: 12px; color: var(--muted); }
    /* note edit */
    .note-display { font-size: 12px; color: var(--muted); font-style: italic; cursor: pointer; }
    .note-display:hover { color: var(--text); }
    .note-input { background: #110828; border: 1px solid var(--secondary); color: var(--text); border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: inherit; width: 100%; display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Sasha Replies <small>KOL feed · reply log · scorecard</small></h1>
    <nav class="nav">
      <a href="/">Tasks</a>
      <a href="/reports">Reports</a>
      <a href="/sasha">Activity</a>
      <a href="/reply-feed">Reply Feed</a>
      <a href="/replies" class="active">Replies</a>
      <button class="btn" id="refresh-btn" style="margin-left:12px">Refresh</button>
    </nav>
  </header>

  <main>
    <!-- Stats row -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Replies</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-week">—</div><div class="stat-label">This Week</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-avg-score">—</div><div class="stat-label">Avg Score</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-avg-likes">—</div><div class="stat-label">Avg Likes (checked)</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-pending-check">—</div><div class="stat-label">Pending Check</div></div>
    </div>

    <div class="two-col">
      <!-- LEFT: KOL list -->
      <div>
        <div class="card">
          <div class="card-title">
            KOL List
            <button class="btn-ghost" id="add-kol-btn">+ Add</button>
          </div>
          <div id="kol-list"></div>

          <div class="add-form" id="add-form">
            <div class="field"><label>Twitter handle (no @)</label><input id="new-handle" placeholder="e.g. brian_armstrong" /></div>
            <div class="field"><label>Topics of interest (comma-separated)</label><input id="new-topics" placeholder="DeFi, regulatory, crypto education" /></div>
            <div class="field"><label>Sasha's angle</label><textarea id="new-angle" placeholder="What angle should Sasha take when replying to this person?"></textarea></div>
            <div style="display:flex;gap:8px;">
              <button class="btn" id="save-kol-btn">Save</button>
              <button class="btn-ghost" id="cancel-kol-btn">Cancel</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Scorecard by Handle</div>
          <div id="scorecard"></div>
        </div>
      </div>

      <!-- RIGHT: Reply log -->
      <div class="card">
        <div class="card-title">
          Reply Log
          <span id="reply-count" style="font-size:12px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">0 replies</span>
        </div>

        <div class="filter-bar">
          <input class="search-input" id="search" placeholder="Search replies..." />
          <select id="filter-handle">
            <option value="">All handles</option>
          </select>
          <select id="filter-score">
            <option value="">Any score</option>
            <option value="5">★★★★★ 5</option>
            <option value="4">★★★★ 4+</option>
            <option value="3">★★★ 3+</option>
            <option value="0">Unscored</option>
          </select>
          <select id="filter-check">
            <option value="">All</option>
            <option value="pending">Pending check</option>
            <option value="checked">Checked</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Handle</th>
              <th>Reply</th>
              <th>Engagement</th>
              <th>Score</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="reply-table"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmt = iso => {
      if (!iso) return '—';
      const d = new Date(iso);
      return isNaN(d) ? iso : d.toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    };
    const isThisWeek = iso => {
      if (!iso) return false;
      const d = new Date(iso);
      const now = new Date();
      const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
      weekStart.setHours(0,0,0,0);
      return d >= weekStart;
    };
    const scoreClass = n => n >= 5 ? 's5' : n >= 4 ? 's4' : n >= 3 ? 's3' : n >= 1 ? 's2' : 's0';

    let kolData = { targets: [], selection_rules: {} };
    let replyLog = [];

    // ── Render KOL list ──────────────────────────────────────────────────────
    function renderKolList() {
      const list = $('kol-list');
      if (!kolData.targets.length) { list.innerHTML = '<div class="empty">No KOLs yet — add one.</div>'; return; }
      list.innerHTML = kolData.targets.map((t, i) => `
        <div class="kol-item">
          <div class="kol-avatar">${t.handle[0].toUpperCase()}</div>
          <div class="kol-meta">
            <div class="kol-name">@${esc(t.handle)}</div>
            <div class="kol-angle">${esc(t.sasha_angle || '')}</div>
            <div class="kol-topics">
              ${(t.topics_of_interest || []).map(tp => `<span class="topic-chip">${esc(tp)}</span>`).join('')}
            </div>
          </div>
          <button class="btn-danger" onclick="removeKol(${i})" title="Remove">✕</button>
        </div>
      `).join('');
    }

    // ── Render scorecard ─────────────────────────────────────────────────────
    function renderScorecard() {
      const sc = $('scorecard');
      const byHandle = {};
      for (const e of replyLog) {
        const h = e.target_handle || '—';
        if (!byHandle[h]) byHandle[h] = { total: 0, scored: 0, scoreSum: 0, likes: 0, likeCount: 0 };
        byHandle[h].total++;
        if (e.score) { byHandle[h].scored++; byHandle[h].scoreSum += e.score; }
        if (e.likes_24h != null) { byHandle[h].likes += e.likes_24h; byHandle[h].likeCount++; }
      }
      const rows = Object.entries(byHandle).map(([h, s]) => ({
        handle: h,
        avgScore: s.scored ? (s.scoreSum / s.scored).toFixed(1) : null,
        avgLikes: s.likeCount ? (s.likes / s.likeCount).toFixed(1) : null,
        total: s.total,
      })).sort((a, b) => (b.avgScore || 0) - (a.avgScore || 0));

      if (!rows.length) { sc.innerHTML = '<div class="empty">No data yet.</div>'; return; }
      const maxScore = 5;
      sc.innerHTML = rows.map(r => `
        <div class="sc-row">
          <div class="sc-handle">@${esc(r.handle)}</div>
          <div class="sc-bar-wrap">
            <div class="sc-bar" style="width:${r.avgScore ? (r.avgScore / maxScore * 100) : 0}%"></div>
          </div>
          <div class="sc-val">
            ${r.avgScore ? `★ ${r.avgScore}` : '<span style="color:var(--muted)">—</span>'}
            ${r.avgLikes != null ? `<br><span style="font-size:11px">${r.avgLikes} ❤</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    // ── Render reply table ───────────────────────────────────────────────────
    function renderReplies() {
      const search = $('search').value.toLowerCase();
      const filterHandle = $('filter-handle').value;
      const filterScore = $('filter-score').value;
      const filterCheck = $('filter-check').value;

      let rows = [...replyLog].reverse();

      if (search) rows = rows.filter(e =>
        (e.tweet_text || '').toLowerCase().includes(search) ||
        (e.target_handle || '').toLowerCase().includes(search)
      );
      if (filterHandle) rows = rows.filter(e => e.target_handle === filterHandle);
      if (filterScore === '0') rows = rows.filter(e => !e.score);
      else if (filterScore) rows = rows.filter(e => (e.score || 0) >= parseInt(filterScore));
      if (filterCheck === 'pending') rows = rows.filter(e => !e.engagement_checked);
      if (filterCheck === 'checked') rows = rows.filter(e => e.engagement_checked);

      $('reply-count').textContent = `${rows.length} / ${replyLog.length} replies`;

      const tb = $('reply-table');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">No replies match filters.</td></tr>'; return; }

      tb.innerHTML = rows.map(e => {
        const scoreVal = e.score || 0;
        const scClass = scoreClass(scoreVal);
        const methodPill = e.method === 'adb' || e.method === 'adb-manual'
          ? '<span class="pill pill-adb">ADB</span>'
          : '<span class="pill pill-api">API</span>';

        const engHtml = e.engagement_checked
          ? `<div class="eng-bar"><span>❤ <span class="val">${e.likes_24h ?? '—'}</span></span><span>💬 <span class="val">${e.replies_24h ?? '—'}</span></span></div>`
          : `<span style="font-size:11px;color:var(--muted)">${e.engagement_check_due ? 'Due ' + fmt(e.engagement_check_due) : '—'}</span>`;

        const replyId = esc(e.id || e.in_reply_to || '');

        return `<tr>
          <td class="ts">${fmt(e.posted_at)}</td>
          <td>
            <div class="handle"><a class="ext" href="${e.tweet_url ? esc(e.tweet_url) : '#'}" target="_blank">@${esc(e.target_handle || '—')}</a></div>
            ${methodPill}
          </td>
          <td class="reply-text">${esc(e.tweet_text || '')}</td>
          <td>${engHtml}</td>
          <td>
            <div class="stars" data-id="${replyId}" data-score="${scoreVal}">
              ${[1,2,3,4,5].map(n => `<span class="${n <= scoreVal ? 'lit' : ''}" data-n="${n}">★</span>`).join('')}
            </div>
          </td>
          <td>
            <div class="note-display" onclick="editNote(this, '${replyId}')" title="Click to edit">${esc(e.note || 'Add note...')}</div>
            <input class="note-input" onblur="saveNote(this, '${replyId}')" onkeydown="if(event.key==='Enter'){this.blur();}" placeholder="Note..." />
          </td>
        </tr>`;
      }).join('');

      // Star click handlers
      tb.querySelectorAll('.stars').forEach(starEl => {
        starEl.querySelectorAll('span').forEach(star => {
          star.addEventListener('click', () => {
            const id = starEl.dataset.id;
            const n = parseInt(star.dataset.n);
            const current = parseInt(starEl.dataset.score || '0');
            const newScore = n === current ? 0 : n; // click same star = clear
            saveScore(id, newScore);
          });
          star.addEventListener('mouseover', () => {
            const n = parseInt(star.dataset.n);
            starEl.querySelectorAll('span').forEach(s => s.classList.toggle('lit', parseInt(s.dataset.n) <= n));
          });
          starEl.addEventListener('mouseleave', () => {
            const current = parseInt(starEl.dataset.score || '0');
            starEl.querySelectorAll('span').forEach(s => s.classList.toggle('lit', parseInt(s.dataset.n) <= current));
          });
        });
      });
    }

    // ── Score save ───────────────────────────────────────────────────────────
    async function saveScore(id, score) {
      const entry = replyLog.find(e => e.id === id || e.in_reply_to === id);
      if (!entry) return;
      entry.score = score;
      await fetch(`/api/reply-log/${encodeURIComponent(id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ score }),
      });
      renderReplies();
      renderScorecard();
      updateStats();
    }

    // ── Note edit ────────────────────────────────────────────────────────────
    function editNote(displayEl, id) {
      const input = displayEl.nextElementSibling;
      const entry = replyLog.find(e => e.id === id || e.in_reply_to === id);
      input.value = entry?.note || '';
      displayEl.style.display = 'none';
      input.style.display = 'block';
      input.focus();
    }
    async function saveNote(inputEl, id) {
      const note = inputEl.value.trim();
      const displayEl = inputEl.previousElementSibling;
      const entry = replyLog.find(e => e.id === id || e.in_reply_to === id);
      if (entry) entry.note = note;
      displayEl.textContent = note || 'Add note...';
      displayEl.style.display = '';
      inputEl.style.display = 'none';
      await fetch(`/api/reply-log/${encodeURIComponent(id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note }),
      });
    }

    // ── Stats ────────────────────────────────────────────────────────────────
    function updateStats() {
      $('stat-total').textContent = replyLog.length;
      $('stat-week').textContent = replyLog.filter(e => isThisWeek(e.posted_at)).length;
      const scored = replyLog.filter(e => e.score);
      $('stat-avg-score').textContent = scored.length
        ? (scored.reduce((s, e) => s + e.score, 0) / scored.length).toFixed(1) + ' ★'
        : '—';
      const checked = replyLog.filter(e => e.engagement_checked && e.likes_24h != null);
      $('stat-avg-likes').textContent = checked.length
        ? (checked.reduce((s, e) => s + e.likes_24h, 0) / checked.length).toFixed(1)
        : '—';
      $('stat-pending-check').textContent = replyLog.filter(e => !e.engagement_checked && e.engagement_check_due).length;
    }

    // ── KOL add/remove ───────────────────────────────────────────────────────
    window.removeKol = async (idx) => {
      if (!confirm(`Remove @${kolData.targets[idx].handle}?`)) return;
      kolData.targets.splice(idx, 1);
      await fetch('/api/kol-targets', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(kolData, null, 2) });
      renderKolList(); renderScorecard();
    };

    $('add-kol-btn').addEventListener('click', () => {
      $('add-form').classList.toggle('open');
      $('add-kol-btn').textContent = $('add-form').classList.contains('open') ? '✕ Cancel' : '+ Add';
    });
    $('cancel-kol-btn').addEventListener('click', () => {
      $('add-form').classList.remove('open');
      $('add-kol-btn').textContent = '+ Add';
    });
    $('save-kol-btn').addEventListener('click', async () => {
      const handle = $('new-handle').value.trim().replace('@', '');
      const topics = $('new-topics').value.split(',').map(t => t.trim()).filter(Boolean);
      const angle  = $('new-angle').value.trim();
      if (!handle) { alert('Handle required'); return; }
      kolData.targets.push({ handle, topics_of_interest: topics, sasha_angle: angle });
      await fetch('/api/kol-targets', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(kolData, null, 2) });
      $('new-handle').value = ''; $('new-topics').value = ''; $('new-angle').value = '';
      $('add-form').classList.remove('open');
      $('add-kol-btn').textContent = '+ Add';
      renderKolList();
    });

    // ── Populate handle filter ───────────────────────────────────────────────
    function populateHandleFilter() {
      const sel = $('filter-handle');
      const handles = [...new Set(replyLog.map(e => e.target_handle).filter(Boolean))].sort();
      handles.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h; opt.textContent = '@' + h;
        sel.appendChild(opt);
      });
    }

    // ── Load all data ────────────────────────────────────────────────────────
    async function load() {
      const [kolRes, logRes] = await Promise.allSettled([
        fetch('/api/kol-targets').then(r => r.json()),
        fetch('/api/reply-log').then(r => r.json()),
      ]);
      if (kolRes.status === 'fulfilled') kolData = kolRes.value;
      if (logRes.status === 'fulfilled') replyLog = Array.isArray(logRes.value) ? logRes.value : [];

      renderKolList();
      populateHandleFilter();
      renderReplies();
      renderScorecard();
      updateStats();
    }

    // ── Filters ──────────────────────────────────────────────────────────────
    ['search', 'filter-handle', 'filter-score', 'filter-check'].forEach(id => {
      $(id).addEventListener('input', renderReplies);
      $(id).addEventListener('change', renderReplies);
    });

    $('refresh-btn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
